version: '3'

vars:
  IMAGE: harbor.squid-ink.us/politeauthority/ip-sentry-watcher
  TAG:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  build-watcher:
    desc: Build and push the watcher image for amd64 + arm64
    cmds:
      - |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t {{.IMAGE}}:{{.TAG}} \
          -t {{.IMAGE}}:latest \
          --push \
          .
      - echo "Pushed {{.IMAGE}}:{{.TAG}}"

  helm-lint:
    cmds:
      - |
        helm lint ./
        echo "🙌 Wu-Tang"
  ban-ip:
    requires:
      vars: [IP]
    vars:
      REASON: '{{default "manual" .REASON}}'
    cmds:
      - |
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        EXPIRES=$(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ)
        UPDATED=$(kubectl get cm -n ip-sentry ip-sentry-blocklist \
          -o jsonpath='{.data.blocklist\.json}' | \
          jq -c --arg ip "{{.IP}}" --arg now "$NOW" --arg expires "$EXPIRES" --arg reason "{{.REASON}}" \
          '. + {($ip): {"banned_at": $now, "expires_at": $expires, "reason": $reason, "hit_count": 1}}')
        kubectl patch cm -n ip-sentry ip-sentry-blocklist --type=merge \
          -p "{\"data\":{\"blocklist.json\":$(echo "$UPDATED" | jq -Rs .)}}"
        echo "Banned {{.IP}} (reason: {{.REASON}}) until $EXPIRES"
    silent: true

  import-bans:
    requires:
      vars: [FILE]
    cmds:
      - |
        EXISTING=$(kubectl get cm -n ip-sentry ip-sentry-blocklist \
          -o jsonpath='{.data.blocklist\.json}')
        NEW=$(jq 'map({(.ip): {banned_at: .banned_at, expires_at: .expires_at, reason: .reason, hit_count: .hits}}) | add' \
          "{{.FILE}}")
        MERGED=$(echo "$EXISTING" | jq --argjson new "$NEW" '. + $new')
        kubectl patch cm -n ip-sentry ip-sentry-blocklist --type=merge \
          -p "{\"data\":{\"blocklist.json\":$(echo "$MERGED" | jq -Rs .)}}"
        echo "Imported $(echo "$NEW" | jq 'length') IPs from {{.FILE}}"
    silent: true

  map-banned:
    cmds:
      - kubectl get cm -n ip-sentry ip-sentry-blocklist -o jsonpath='{.data.blocklist\.json}' > banned.json
      - scripts/.venv/bin/python scripts/map_bans.py --input banned.json --output scripts/ban_map.html
      - open scripts/ban_map.html
    silent: true


apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ip-sentry.fullname" . }}-watcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ip-sentry.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: watcher
    spec:
      serviceAccountName: {{ include "ip-sentry.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.watcher.podSecurityContext | nindent 8 }}
      containers:
        - name: watcher
          image: {{ .Values.watcher.image.repository }}:{{ .Values.watcher.image.tag }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BLOCKLIST_CM
              value: {{ include "ip-sentry.fullname" . }}-blocklist
          envFrom:
            - configMapRef:
                name: {{ include "ip-sentry.fullname" . }}-config
          securityContext:
            {{- toYaml .Values.watcher.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # pod_watcher() writes /tmp/healthy within the first 30s loop iteration.
          startupProbe:
            exec:
              command: ["test", "-f", "/tmp/healthy"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          # Kill the pod if the heartbeat is stale for >2 minutes (missed 4 cycles).
          livenessProbe:
            exec:
              command: ["sh", "-c", "find /tmp/healthy -mmin -2 | grep -q ."]
            periodSeconds: 30
            failureThreshold: 4
          resources:
            {{- toYaml .Values.watcher.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
